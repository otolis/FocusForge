name: focusforge
description: AI-Powered Task Manager + Habit Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  chrono_dart: ^2.0.2
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.0
  flutter_riverpod: ^2.6.1
  go_router: ^17.1.0
  google_sign_in: ^7.2.0
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.4
  image_picker: ^1.2.1
  smooth_page_indicator: ^2.0.1
  flutter_slidable: ^4.0.3
  flutter_svg: ^2.2.4
  intl: ^0.19.0
  tflite_flutter: ^0.12.1
  fl_chart: ^1.2.0
  contribution_heatmap: ^0.5.3
  appflowy_board: ^0.1.2
  uuid: ^4.5.1
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0
  lottie: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/ml/
    - assets/animations/
